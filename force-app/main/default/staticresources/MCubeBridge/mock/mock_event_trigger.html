<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MCube Event Trigger (Fingertip Platform Simulator)</title>
  <style>
    /* ── Reset & base ────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #f1f3f4;
      color: #202124;
      min-height: 100vh;
    }

    /* ── Dark header ─────────────────────────────────────────────── */
    header {
      background: #202124;
      color: #fff;
      padding: 16px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
      box-shadow: 0 2px 6px rgba(0,0,0,.4);
    }
    header h1 { font-size: 1.15rem; font-weight: 600; }
    header .subtitle { font-size: .8rem; color: #9aa0a6; margin-top: 2px; }

    /* ── Card ────────────────────────────────────────────────────── */
    .card {
      background: #fff;
      border-radius: 8px;
      box-shadow: 0 1px 4px rgba(0,0,0,.15);
      padding: 24px;
      max-width: 560px;
      margin: 32px auto;
    }
    .card h2 { font-size: 1rem; font-weight: 600; margin-bottom: 16px; color: #3c4043; }

    /* ── Input ───────────────────────────────────────────────────── */
    label { font-size: .85rem; font-weight: 500; display: block; margin-bottom: 4px; }
    input[type="text"] {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #dadce0;
      border-radius: 4px;
      font-size: .95rem;
      outline: none;
      transition: border-color .2s;
    }
    input[type="text"]:focus { border-color: #1a73e8; }

    /* ── Button grid ─────────────────────────────────────────────── */
    .btn-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 20px;
    }
    .btn {
      padding: 10px 14px;
      border: none;
      border-radius: 4px;
      font-size: .9rem;
      font-weight: 500;
      cursor: pointer;
      transition: opacity .15s, transform .1s;
    }
    .btn:active { transform: scale(.97); }
    .btn-primary   { background: #1a73e8; color: #fff; }
    .btn-danger    { background: #d93025; color: #fff; }
    .btn-secondary { background: #e8f0fe; color: #1a73e8; }
    .btn-success   { background: #188038; color: #fff; }
    .btn-warning   { background: #f29900; color: #fff; }
    .btn:hover { opacity: .88; }
    .btn-full { grid-column: 1 / -1; }

    /* ── Log panel ───────────────────────────────────────────────── */
    .log-panel { margin-top: 28px; }
    .log-panel h2 { font-size: .95rem; font-weight: 600; color: #3c4043; margin-bottom: 8px; }
    #log {
      background: #202124;
      color: #8ab4f8;
      border-radius: 6px;
      padding: 12px 14px;
      font-family: 'Courier New', monospace;
      font-size: .78rem;
      min-height: 140px;
      max-height: 320px;
      overflow-y: auto;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .log-entry { margin-bottom: 4px; }
    .log-ts { color: #5f6368; }

    .clear-btn {
      margin-top: 8px;
      background: none;
      border: 1px solid #dadce0;
      border-radius: 4px;
      padding: 4px 12px;
      font-size: .8rem;
      cursor: pointer;
      color: #5f6368;
    }
    .clear-btn:hover { background: #f1f3f4; }
  </style>
</head>
<body>

<header>
  <div>
    <h1>📡 MCube Event Trigger</h1>
    <div class="subtitle">Fingertip Platform Simulator — BroadcastChannel: <code>mcube_channel</code></div>
  </div>
</header>

<div class="card">
  <h2>📞 Telephony Event Controls</h2>

  <!-- Phone number input -->
  <label for="phoneNumber">Caller Phone Number</label>
  <input
    type="text"
    id="phoneNumber"
    value="9876543210"
    placeholder="Enter phone number"
    aria-label="Caller phone number"
  />

  <!-- Event buttons -->
  <div class="btn-grid">
    <!-- Incoming Call -->
    <button class="btn btn-primary btn-full" onclick="triggerEvent('INCOMING_CALL')">
      🔔 Trigger Incoming Call
    </button>

    <!-- Call Ended -->
    <button class="btn btn-secondary" onclick="triggerEvent('CALL_ENDED')">
      📵 Trigger Call Ended
    </button>

    <!-- Call Rejected -->
    <button class="btn btn-danger" onclick="triggerEvent('CALL_REJECTED')">
      ❌ Trigger Call Rejected
    </button>

    <!-- Agent Available -->
    <button class="btn btn-success" onclick="triggerEvent('AGENT_AVAILABLE')">
      🟢 Agent Available
    </button>

    <!-- Agent Busy -->
    <button class="btn btn-warning" onclick="triggerEvent('AGENT_BUSY')">
      🔴 Agent Busy
    </button>
  </div>
</div>

<!-- Event log -->
<div class="card log-panel">
  <h2>📋 Sent Events Log</h2>
  <div id="log"><span style="color:#5f6368">// Events will appear here after you click a button...</span></div>
  <button class="clear-btn" onclick="clearLog()">🗑 Clear Log</button>
</div>

<script>
  // ── BroadcastChannel setup ───────────────────────────────────────
  // Uses the shared channel name so mock_mcube_softphone.html can receive events.
  const channel = new BroadcastChannel('mcube_channel');

  // A rolling call ID for demo purposes
  let callCounter = 1;
  function nextCallId() {
    return 'CALL' + String(callCounter++).padStart(3, '0');
  }

  // Keep a stable callId for the current "active call" so END/REJECT match
  let activeCallId  = 'CALL001';
  let activeCallerNumber = '';

  /**
   * Builds and broadcasts the appropriate event payload based on the button clicked.
   * @param {string} type - One of INCOMING_CALL | CALL_ENDED | CALL_REJECTED | AGENT_AVAILABLE | AGENT_BUSY
   */
  function triggerEvent(type) {
    const callerNumber = document.getElementById('phoneNumber').value.trim() || '9876543210';
    let payload = null;

    switch (type) {
      case 'INCOMING_CALL':
        // Fresh call ID for each incoming call
        activeCallId = nextCallId();
        activeCallerNumber = callerNumber;
        payload = {
          event: 'INCOMING_CALL',
          callerNumber: callerNumber,
          callId: activeCallId
        };
        break;

      case 'CALL_ENDED':
        payload = {
          event: 'CALL_ENDED',
          callerNumber: activeCallerNumber || callerNumber,
          callId: activeCallId,
          duration: 120   // mock duration in seconds
        };
        break;

      case 'CALL_REJECTED':
        payload = {
          event: 'CALL_REJECTED',
          callerNumber: activeCallerNumber || callerNumber,
          callId: activeCallId
        };
        break;

      case 'AGENT_AVAILABLE':
        payload = {
          event: 'AGENT_STATUS_CHANGED',
          status: 'Available'
        };
        break;

      case 'AGENT_BUSY':
        payload = {
          event: 'AGENT_STATUS_CHANGED',
          status: 'Busy'
        };
        break;

      default:
        logEntry('⚠ Unknown event type: ' + type);
        return;
    }

    // Broadcast via BroadcastChannel
    channel.postMessage(payload);
    logEntry('✅ SENT → ' + JSON.stringify(payload));
  }

  // ── Log helpers ──────────────────────────────────────────────────

  /**
   * Appends a timestamped line to the on-screen log panel.
   * @param {string} message
   */
  function logEntry(message) {
    const log = document.getElementById('log');

    // Remove placeholder text on first real entry
    if (log.querySelector('span')) {
      log.innerHTML = '';
    }

    const ts = new Date().toLocaleTimeString();
    const div = document.createElement('div');
    div.className = 'log-entry';
    div.innerHTML = `<span class="log-ts">[${ts}]</span> ${escapeHtml(message)}`;
    log.appendChild(div);

    // Auto-scroll to bottom
    log.scrollTop = log.scrollHeight;
  }

  /** Clears the log panel. */
  function clearLog() {
    document.getElementById('log').innerHTML =
      '<span style="color:#5f6368">// Log cleared.</span>';
  }

  /** Minimal HTML escaping to prevent XSS in log display. */
  function escapeHtml(str) {
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;');
  }
</script>
</body>
</html>
